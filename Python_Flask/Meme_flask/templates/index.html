<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30" />
    <title>Meme Station</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #ff4500; /* Reddit Orange */
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Progress bar for the 30s refresh */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--accent);
            width: 100%;
            animation: countdown 30s linear infinite;
        }

        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            letter-spacing: 2px;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .meme-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px 0;
        }

        .meme-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .info {
            margin-top: 15px;
            font-style: italic;
            color: #888;
        }

        .subreddit-tag {
            background: #333;
            padding: 2px 10px;
            border-radius: 20px;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="timer-bar"></div>

    <div class="container">
        <h1>Meme Explorer</h1>
        <p>New meme incoming in 30 seconds...</p>
        
        <div class="meme-card">
            <img src="{{meme_pic}}" class="meme-img" alt="Meme">
            <div class="info">
                Source: <span class="subreddit-tag">r/{{subreddit}}</span>
            </div>
        </div>
        
        <p style="font-size: 0.8rem; opacity: 0.6;">Tip: Press F5 to skip the wait.</p>
    </div>
</body>
</html>
